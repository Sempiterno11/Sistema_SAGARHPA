<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}SAGARHPA{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #f4f7f6; }
        .navbar { background-color: #1a3a5a !important; }
        .sidebar { min-height: 100vh; background: white; border-right: 1px solid #dee2e6; }
        .nav-link { color: #333; font-weight: 500; }
        .nav-link:hover { background-color: #e9ecef; color: #1a3a5a; }
        .nav-link.active  { color: #1a3a5a; background-color: #e9ecef; border-left: 4px solid #1a3a5a; }
    </style>
 </head>
 <body>

    <nav class="navbar navbar-expand-lg navbar-dark shadow">
        <div class="container-fluid">
            <a class="navbar-brand d-flex align-items-center" href="{% url 'lista_oficios' %}">
                <i class="fa-solid fa-building-columns me-2 fs-3"></i>
                <div class="lh-1">
                    <span class="fw-bold d-block">SAGARHPA</span> 
                    <small style="font-size: 0.7rem;" class="text-white-50">Control de Correspondencia</small>
                </div>
            </a>
            <div class="d-flex align-items-center">
                <span class="text-white-50 me-3">
                    <i class="fa-regular fa-user-circle me-1"></i>
                    {% if user.is_authenticated %}
                        {{ user.username }}
                    {% else %}
                        Invitado
                    {% endif %}
                </span>
                {% if user.is_authenticated %}
                    <form action="{% url 'logout' %}" method="POST" class="d-inline">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-sm btn-outline-light border-0">
                            <i class="fa-solid fa-right-from-bracket me-1"></i> 
                        </button>
                    </form>
                {% endif %}
            </div>
        </div>
    </nav>

    <div class="container-fluid">
        <div class="row">
            <nav class="col-md-2 d-none d-md-block sidebar py-4">
                <div class="position-sticky">
                    <ul class="nav flex-column">
                        <li class="nav-item">
                            <a class="nav-link active mb-2" href="{% url 'lista_oficios' %}">
                                <i class="fa-solid fa-house me-2"></i> Inicio
                            </a>
                        <li class="nav-item">
                            <a class="nav-link mb-2" href="{% url 'historial_oficios' %}">
                                <i class="fa-solid fa-clock-history me-2"></i> Historial (Respondidos)
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link mb-2" href="{% url 'archivo_muerto' %}">
                                <i class="fa-solid fa-folder-open me-2"></i> Archivo Muerto
                            </a>
                        </li>
                        <li class="nav-item border-top mt-3 pt-3">
                            <a class="nav-link text-danger" href="/admin">
                                <i class="fa-solid fa-lock me-2"></i> Panel Admin
                            </a>
                        </li>
                    </ul>
                </div>
            </nav>

            <main class="col-md-10 ms-sm-auto px-md-4 py-4">
                {% block content %}
                {% endblock %}
            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
